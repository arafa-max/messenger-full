name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Тесты ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run tests
        run: go test ./... -timeout 60s

  # ── 2. Build + Push Docker образа ───────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy на сервер ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,deploy/"
          target: "/opt/messenger"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/messenger

            cat > .env << 'EOF'
            ENV=production
            SERVER_PORT=8080
            SERVER_HOST=0.0.0.0
            DOMAIN=${{ secrets.DOMAIN }}
            PUBLIC_URL=https://${{ secrets.DOMAIN }}
            SERVER_PUBLIC_IP=${{ secrets.SERVER_PUBLIC_IP }}

            DB_HOST=pgbouncer
            DB_PORT=6432
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_SSLMODE=disable

            REDIS_URL=redis://redis:6379

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_MINUTES=15
            JWT_REFRESH_DAYS=30

            MINIO_ENDPOINT=minio:9000
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            MINIO_BUCKET=messenger-media
            MINIO_USE_SSL=false
            MINIO_PUBLIC_HOST=https://${{ secrets.DOMAIN }}/media

            TURN_HOST=${{ secrets.DOMAIN }}
            TURN_PORT=3478
            TURN_TLS_PORT=5349
            TURN_AUTH_SECRET=${{ secrets.TURN_AUTH_SECRET }}
            TURN_TTL=86400

            SFU_URL=http://sfu:4000
            MEDIASOUP_LISTEN_IP=0.0.0.0
            MEDIASOUP_ANNOUNCED_IP=${{ secrets.SERVER_PUBLIC_IP }}

            WEBAUTHN_RP_ID=${{ secrets.DOMAIN }}
            WEBAUTHN_ORIGIN=https://${{ secrets.DOMAIN }}

            WHISPER_URL=http://whisper:9300
            WHISPER_TIMEOUT=60
            PIPER_URL=http://piper:9301
            PIPER_TIMEOUT=30
            LIBRETRANSLATE_URL=http://libretranslate:5000
            LIBRETRANSLATE_API_KEY=
            LIBRETRANSLATE_TIMEOUT=30

            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PREMIUM_PRICE_ID=${{ secrets.STRIPE_PREMIUM_PRICE_ID }}

            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            MAGIC_LINK_FROM=noreply@${{ secrets.DOMAIN }}

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}

            TENOR_API_KEY=${{ secrets.TENOR_API_KEY }}
            FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            SPAM_NEW_MEMBER_MAX_MSGS=20
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose up -d --no-build postgres redis pgbouncer minio
            sleep 5
            docker compose run --rm app ./migrate up
            docker compose up -d --no-build
            docker image prune -f
            echo "✅ Deploy completed"