            type: array
      security:
      - BearerAuth: []
      summary: Get pinned messages
      tags:
      - messages
  /chats/{id}/read:
    post:
      parameters:
      - description: Chat ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark chat as read
      tags:
      - messages
  /chats/{id}/typing:
    post:
      parameters:
      - description: Chat ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Typing indicator
      tags:
      - messages
  /chats/dm:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target user
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createDMReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.chatResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
