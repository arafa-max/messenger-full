    post:
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Pin message
      tags:
      - messages
  /messages/{id}/react:
    delete:
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: Emoji
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.reactReq'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove reaction
      tags:
      - messages
    post:
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: Emoji
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.reactReq'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
