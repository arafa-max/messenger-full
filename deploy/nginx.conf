# ── Оптимизация воркеров ──────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Базовые настройки ─────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # скрываем версию nginx

    # ── Логи ─────────────────────────────────────────────────
    log_format json escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"ip":"$remote_addr",'
        '"ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ── Сжатие ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-msgpack;  # MessagePack тоже сжимаем

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream ──────────────────────────────────────────────
    upstream app {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS + WSS ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name $DOMAIN;  # ← заменить на свой домен

        # TLS (Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/live/$DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/$DOMAIN/privkey.pem;

        # Современные TLS настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss:;" always;

        # Размер загружаемых файлов (для медиа)
        client_max_body_size 100m;

        # ── WebSocket (/ws) ───────────────────────────────────
        location /ws {
            proxy_pass http://app;
            proxy_http_version 1.1;

            # Обязательно для WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Долгий таймаут для WS соединений
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Без rate limit для WS (уже авторизованные)
            limit_conn addr 10;
        }

        # ── Auth эндпоинты (строгий rate limit) ──────────────
        location ~ ^/api/v1/auth/(register|login) {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Метрики (только внутренняя сеть) ─────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Все остальные API запросы ─────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Таймауты
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── MinIO медиа (публичная раздача файлов) ────────────
        location /media/ {
            proxy_pass http://minio:9000/messenger-media/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Grafana ────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        }
    }

    # ── stub_status (для nginx_exporter) ──────────────────────
    server {
        listen 8081;
        server_name localhost;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}