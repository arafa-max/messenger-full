# ============================================================
# coturn — TURN/STUN сервер для WebRTC NAT traversal
# Файл: /etc/turnserver.conf
# Запуск: turnserver -c /etc/turnserver.conf
# ============================================================

# ─── Сеть ───────────────────────────────────────────────────

# Внешний IP твоего VPS (замени на реальный)
external-ip=YOUR_VPS_IP

# Порты
listening-port=3478        # STUN/TURN UDP+TCP
tls-listening-port=5349    # TURN TLS (для клиентов за strict firewall)

# Слушаем на всех интерфейсах
listening-ip=0.0.0.0

# ─── Аутентификация ─────────────────────────────────────────

# Realm — имя твоего сервера
realm=messenger.yourdomain.com

# Временные credentials (безопаснее чем статические)
# Клиент получает username/password через API на 24 часа
use-auth-secret
static-auth-secret=REPLACE_WITH_RANDOM_SECRET_64_CHARS

# ─── TLS ────────────────────────────────────────────────────

# Сертификаты (Let's Encrypt)
cert=/etc/letsencrypt/live/messenger.yourdomain.com/fullchain.pem
pkey=/etc/letsencrypt/live/messenger.yourdomain.com/privkey.pem

# Минимальная версия TLS
no-tlsv1
no-tlsv1_1

# ─── Безопасность ───────────────────────────────────────────

# Запрещаем использовать TURN для доступа к внутренней сети
no-loopback-peers
no-multicast-peers

# Только реле (не позволяем использовать как прокси)
no-tcp-relay

# Fingerprint в STUN пакетах
fingerprint

# Порты для медиа relay (UDP)
min-port=50000
max-port=65535  # coturn relay, не пересекается с mediasoup (40000-49999)

# ─── Логи ───────────────────────────────────────────────────

log-file=/var/log/turnserver.log
verbose