[databases]
messenger = host=postgres port=5432 dbname=messenger

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; transaction pooling — лучший баланс для REST API
pool_mode = transaction

; максимум соединений к PostgreSQL
server_pool_size = 20
max_client_conn = 200

; аутентификация через userlist.txt
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; логи
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; health check
server_check_query = SELECT 1
server_check_delay = 10

; таймауты
server_connect_timeout = 5
server_login_retry = 1
client_login_timeout = 10