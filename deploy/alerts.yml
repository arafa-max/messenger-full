groups:
  # ── Приложение ────────────────────────────────────────────
  - name: messenger_app
    rules:
      - alert: AppDown
        expr: up{job="messenger_app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Приложение недоступно"
          description: "messenger_app не отвечает уже {{ $value }}с"

      - alert: HighErrorRate
        expr: |
          rate(messenger_http_requests_total{status=~"5.."}[5m])
          /
          rate(messenger_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Высокий процент ошибок 5xx"
          description: "Ошибок: {{ $value | humanizePercentage }}"

      - alert: SlowResponses
        expr: |
          histogram_quantile(0.95,
            rate(messenger_http_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Медленные ответы API"
          description: "P95 latency = {{ $value | humanizeDuration }}"

      - alert: TooManyWSConnections
        expr: messenger_ws_connections_active > 10000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Много WebSocket соединений"
          description: "Активных WS: {{ $value }}"

  # ── PostgreSQL ────────────────────────────────────────────
  - name: postgres
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL недоступен"

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Много соединений к PostgreSQL"
          description: "Соединений: {{ $value }}"

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Долгие транзакции в PostgreSQL"

  # ── Redis ─────────────────────────────────────────────────
  - name: redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis недоступен"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis использует >90% памяти"
          description: "Использовано: {{ $value | humanizePercentage }}"

  # ── Система ───────────────────────────────────────────────
  - name: system
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая нагрузка CPU"
          description: "CPU: {{ $value }}%"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Заканчивается место на диске"
          description: "Осталось: {{ $value | humanizePercentage }}"