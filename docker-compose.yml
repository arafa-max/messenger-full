version: "3.9"

services:
  # ── Go приложение ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: messenger_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENV=production
      - DOMAIN=${DOMAIN}
      - TENOR_API_KEY=${TENOR_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - TURN_AUTH_SECRET=${TURN_AUTH_SECRET}
      - WHISPER_URL=http://whisper:9300
      - PIPER_URL=http://piper:9301
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - SFU_URL=http://sfu:4000
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - messenger
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: messenger_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - messenger
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── PostgreSQL бэкап (ежедневно в 3:00) ───────────────
  postgres_backup:
    image: postgres:17-alpine
    container_name: messenger_backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
    volumes:
      - ./deploy/backup.sh:/backup.sh:ro
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        chmod +x /backup.sh &&
        echo '0 3 * * * /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    networks:
      - messenger

  # ── pgBouncer (пул соединений) ─────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: messenger_pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    entrypoint: >
      sh -c 'echo "\"$$DB_USER\" \"$$DB_PASSWORD\"" > /etc/pgbouncer/userlist.txt
      && pgbouncer /etc/pgbouncer/pgbouncer.ini'
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # pgBouncer слушает на 6432, не 5432
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - messenger

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - messenger

  # ── MinIO ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: messenger_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messenger

  # ── TURN сервер ────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: messenger_coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./deploy/ssl:/etc/letsencrypt:ro

  # ── SFU (mediasoup) ────────────────────────────────────
  sfu:
    build: ./sfu-server
    container_name: messenger_sfu
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
      - "40000-49999:40000-49999/udp"
    environment:
      SFU_PORT: 4000
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${SERVER_PUBLIC_IP}
    networks:
      - messenger
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ── Whisper STT ────────────────────────────────────────
  whisper:
    build: ./messenger-services/whisper
    container_name: messenger_whisper
    restart: unless-stopped
    # Внутренний порт 9300 — не конфликтует с minio:9000
    ports:
      - "127.0.0.1:9300:9300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - messenger
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Piper TTS ──────────────────────────────────────────
  piper:
    build: ./messenger-services/piper
    container_name: messenger_piper
    restart: unless-stopped
    ports:
      - "127.0.0.1:9301:9301"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9301/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - messenger
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── LibreTranslate ─────────────────────────────────────
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: messenger_libretranslate
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - LT_LOAD_ONLY=ru,en,de,fr,es,zh,ar,tr,kk
      - LT_THREADS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - messenger

  # ── Nginx + TLS ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: messenger_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    networks:
      - messenger

  # ── Certbot (Let's Encrypt авторенью) ─────────────────
  certbot:
    image: certbot/certbot
    container_name: messenger_certbot
    volumes:
      - ./deploy/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - messenger

  # ── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: messenger_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - messenger

  # ── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: messenger_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - messenger

  # ── PostgreSQL Exporter ────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: messenger_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - messenger


  # ── Nginx Exporter ────────────────────────────────────────
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: messenger_nginx_exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx:8081/stub_status
    depends_on:
      - nginx
    networks:
      - messenger

  # ── Redis Exporter ─────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: messenger_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis
    networks:
      - messenger

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  certbot_data:
  backup_data:

networks:
  messenger:
    driver: bridge